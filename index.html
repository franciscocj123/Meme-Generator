<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <form id="memeForm">

    <h1 class="main">MAKE YOUR OWN MEME</h1>
    <h2 class="main" id="formDetails">Fill out the form to create your own MEMES!!!</h2>



    <div class="inputContainer">
    <label for = "imageURL" class="textBox">Image Url</label> <input type = "url" id="imgUrl" class="textInputs" required >
    </div>



    <div class="inputContainer">
    <label for = "textTop" class="textBox">Text on Top</label> <input type = "text" id="textTop" class="textInputs" required>
    </div>




    <div class="inputContainer">
    <label for = "textbottom" class="textBox">Text on bottom</label> <input type = "text" id="textBottom" class="textInputs" required>
    </div>




    <input type="submit" id="submitBtn" value="Add Meme">
    </form>







    <script src ="app.js"></script>

</body>
</html>
